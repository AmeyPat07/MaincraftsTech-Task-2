<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern landing page with contact form by Amey Codes">
    <meta name="keywords" content="landing page, contact form, modern web design">
    <meta name="author" content="Maincrafts Task1 by Amey">
    <link rel="icon" type="image/x-icon" href="contact.ico">
    <title>Contact Us</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-[#1F2933] text-[#E6EDF3] min-h-screen">

<section id="contact" class="container mx-auto px-6 py-24">

    <h2 class="text-4xl font-bold text-center mb-12 tracking-wide">
        Get In Touch
    </h2>

    <div class="max-w-2xl mx-auto">

        <div class="bg-[#2F3E4E] rounded-xl shadow-xl border border-[#3B4C5E] p-10">

            <form id="contactForm" action="http://localhost:8080/api/contact" method="POST">

                <!-- Name -->
                <div class="mb-6">
                    <label for="name" class="block text-[#A7B3C2] font-semibold mb-2">
                        Name
                    </label>
                    <input type="text" id="name" name="name" required
                           class="w-full px-4 py-3 bg-[#273444] border border-[#3B4C5E]
                                  text-[#E6EDF3] rounded-lg
                                  focus:outline-none focus:border-[#A7B3C2]
                                  placeholder-[#9AA5B1] transition"
                           placeholder="Your Name">
                </div>

                <!-- Email -->
                <div class="mb-6">
                    <label for="email" class="block text-[#A7B3C2] font-semibold mb-2">
                        Email
                    </label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 bg-[#273444] border border-[#3B4C5E]
                                  text-[#E6EDF3] rounded-lg
                                  focus:outline-none focus:border-[#A7B3C2]
                                  placeholder-[#9AA5B1] transition"
                           placeholder="Your Email">
                </div>

                <!-- Message -->
                <div class="mb-8">
                    <label for="message" class="block text-[#A7B3C2] font-semibold mb-2">
                        Message
                    </label>
                    <textarea id="message" name="message" rows="5" required
                              class="w-full px-4 py-3 bg-[#273444] border border-[#3B4C5E]
                                     text-[#E6EDF3] rounded-lg resize-none
                                     focus:outline-none focus:border-[#A7B3C2]
                                     placeholder-[#9AA5B1] transition"
                              placeholder="Tell us your query..."></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="w-full bg-[#2F3E4E] text-[#E6EDF3] py-3 rounded-lg
                               border border-[#A7B3C2]
                               hover:bg-[#3B4C5E]
                               transition transform hover:scale-105 font-semibold">
                    <i class="fas fa-paper-plane mr-2"></i>
                    Send Message
                </button>

            </form>

            <div id="formMessage" class="mt-4 hidden text-[#A7B3C2]"></div>

        </div>

    </div>

</section>

</body>
</html>
